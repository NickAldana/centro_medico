<div class="page-header-modern d-flex justify-content-between align-items-center mb-3">
    <h1 class="header-title-modern">
        <i class="fas fa-hospital-user text-secondary me-2"></i> Gestión de Pacientes
    </h1>
    <div class="header-actions d-flex gap-3">
        <button type="button" class="btn btn-primary-custom btn-sm" onclick="abrirModalNuevoPaciente()">
            <i class="fas fa-plus-circle me-1"></i> Nuevo Paciente
        </button>
        <!-- 🔥 FIX: Se usa la función global del JS -->
        <button type="button" class="btn btn-outline-success-custom btn-sm" onclick="exportarExcelPacientes()">
            <i class="fas fa-file-excel me-1"></i> Exportar Excel
        </button>
    </div>
</div>

<div class="card card-filters-modern mb-4">
    <div class="card-body">
        <div class="d-flex align-items-center gap-3">
            <div class="input-group flex-fill">
                <span class="input-group-text"><i class="fas fa-search"></i></span>
                <input type="text" id="filtroNombre" placeholder="Buscar por Nombre, Apellidos, CI..." class="form-control">
            </div>
            
            <div class="input-group" style="max-width: 250px;">
                <span class="input-group-text"><i class="fas fa-clipboard-list"></i></span>
                <select id="filtroEstado" class="form-control">
                    <option value="activo">Activos</option>
                    <option value="inactivo">Inactivos</option>
                    <option value="todos">Todos los Estados</option>
                </select>
            </div>
            
            <!-- 🔥 FIX: La función correcta es loadPacientes(1) -->
            <button class="btn btn-secondary btn-sm" title="Aplicar Filtros" onclick="loadPacientes(1)">
                <i class="fas fa-filter"></i> Filtrar
            </button>
        </div>
    </div>
</div>

<div class="card card-table-modern">
    <div class="card-body table-responsive p-0">
        <table class="table table-hover mb-0" id="tablaPacientes">
            <thead>
                <tr>
                    <th class="text-center" style="width: 50px;">ID</th>
                    <th>Nombre Completo</th>
                    <th>Cédula/CI</th>
                    <th>Contacto</th>
                    <th class="text-center">Fecha Nac.</th>
                    <th class="text-center">Última Cita</th>
                    <th class="text-center">Estado</th>
                    <th class="text-center" style="width: 150px;">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="8" class="text-center py-4">
                        <div class="loading">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2 text-muted">Cargando listado...</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="card-footer" id="pacientesPaginacion"></div>
</div>

<div class="modal fade" id="modalPaciente" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content modal-content-custom">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalTitulo">
                    <i class="fas fa-user-plus me-2"></i> Registrar Nuevo Paciente
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <!-- 🔥 FIX: El formulario maneja el guardado con onsubmit en JS -->
                <form id="formPaciente">
                    <input type="hidden" id="id_paciente" name="id_paciente">

                    <h6 class="text-primary mb-3"><i class="fas fa-id-card me-1"></i> Datos Personales</h6>
                    
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="nombres" class="form-label">Nombres *</label>
                            <input type="text" class="form-control" id="nombres" name="nombres" required maxlength="100">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="apellido_paterno" class="form-label">Apellido Paterno *</label>
                            <input type="text" class="form-control" id="apellido_paterno" name="apellido_paterno" required maxlength="100">
                        </div>
                        <div class="col-md-6">
                            <label for="apellido_materno" class="form-label">Apellido Materno</label>
                            <input type="text" class="form-control" id="apellido_materno" name="apellido_materno" maxlength="100">
                        </div>
                    </div>
                    
                    <div class="row">
                        <!-- 🔥 FIX: Grid ajustado para incluir el campo EDAD -->
                        <div class="col-md-3 mb-3">
                            <label for="ci" class="form-label">Cédula/CI *</label>
                            <input type="text" class="form-control" id="ci" name="ci" required maxlength="20">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="fecha_nacimiento" class="form-label">Fecha de Nac.</label>
                            <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento">
                        </div>
                        <div class="col-md-2 mb-3">
                            <label for="edad" class="form-label">Edad</label>
                            <input type="number" class="form-control bg-light" id="edad" readonly tabindex="-1">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="genero" class="form-label">Género</label>
                            <select class="form-select" id="genero" name="genero">
                                <option value="">(Sin especificar)</option>
                                <option value="M">Masculino</option>
                                <option value="F">Femenino</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="estado_civil" class="form-label">Estado Civil</label>
                            <input type="text" class="form-control" id="estado_civil" name="estado_civil">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="ocupacion" class="form-label">Ocupación</label>
                            <input type="text" class="form-control" id="ocupacion" name="ocupacion">
                        </div>
                    </div>

                    <h6 class="text-primary mt-4"><i class="fas fa-phone-volume me-1"></i> Contacto y Aseguradora</h6>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="telefono" class="form-label">Teléfono Fijo</label>
                            <input type="text" class="form-control" id="telefono" name="telefono">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="celular" class="form-label">Celular</label>
                            <input type="text" class="form-control" id="celular" name="celular">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="direccion" class="form-label">Dirección</label>
                        <textarea class="form-control" id="direccion" name="direccion" rows="2"></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="seguro_medico" class="form-label">Seguro Médico</label>
                            <input type="text" class="form-control" id="seguro_medico" name="seguro_medico">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="numero_seguro" class="form-label">Número de Seguro</label>
                            <input type="text" class="form-control" id="numero_seguro" name="numero_seguro">
                        </div>
                    </div>

                    <h6 class="text-primary mt-4"><i class="fas fa-briefcase-medical me-1"></i> Datos Médicos</h6>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nombre_contacto_emergencia" class="form-label">Contacto de Emergencia</label>
                            <input type="text" class="form-control" id="nombre_contacto_emergencia" name="nombre_contacto_emergencia">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="telefono_contacto_emergencia" class="form-label">Teléfono de Emergencia</label>
                            <input type="text" class="form-control" id="telefono_contacto_emergencia" name="telefono_contacto_emergencia">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="tipo_sangre" class="form-label">Tipo de Sangre</label>
                            <input type="text" class="form-control" id="tipo_sangre" name="tipo_sangre" maxlength="10" placeholder="Ej: O+">
                        </div>
                        <div class="col-md-8 mb-3">
                            <label for="alergias" class="form-label">Alergias</label>
                            <textarea class="form-control" id="alergias" name="alergias" rows="1"></textarea>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="antecedentes_medicos" class="form-label">Antecedentes Médicos</label>
                        <textarea class="form-control" id="antecedentes_medicos" name="antecedentes_medicos" rows="2"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="medicamentos_actuales" class="form-label">Medicamentos Actuales</label>
                        <textarea class="form-control" id="medicamentos_actuales" name="medicamentos_actuales" rows="2"></textarea>
                    </div>

                    <div class="mb-3" id="estadoContainer" style="display:none;">
                        <label for="estado" class="form-label fw-bold">Estado del Paciente</label>
                        <select class="form-select" id="estado" name="estado">
                            <option value="ACTIVO">Activo</option>
                            <option value="INACTIVO">Inactivo</option>
                        </select>
                    </div>

                    <div class="modal-footer px-0 pb-0 pt-3 mt-4 border-top">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="fas fa-times-circle me-1"></i> Cancelar
                        </button>
                        <!-- 🔥 FIX: type="submit" para que funcionen las validaciones nativas HTML -->
                        <button type="submit" class="btn btn-primary-custom" id="btnGuardarPaciente">
                            <i class="fas fa-save me-1"></i> Guardar Paciente
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
