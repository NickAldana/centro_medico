<div class="page-header-modern d-flex justify-content-between align-items-center">
    <div>
        <h1 class="header-title-modern">
            <i class="fas fa-shield-alt text-secondary me-2"></i> Bitácora de Auditoría
        </h1>
        <p class="text-muted mb-0">Registro de seguridad y trazabilidad</p>
    </div>
    <div class="header-actions d-flex gap-2">
        <button class="btn btn-primary btn-sm" onclick="realizarBackupAuditoria()" title="HU008: Copia de seguridad bajo demanda">
            <i class="fas fa-database me-1"></i> Generar Backup
        </button>
        <button class="btn btn-outline-success btn-sm" onclick="exportarExcelAudit()">
            <i class="fas fa-file-excel me-1"></i> Exportar Excel
        </button>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadTablaAuditoria(1)">
            <i class="fas fa-sync-alt me-1"></i> Refrescar
        </button>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-3">
        <div class="stat-card p-3 shadow-sm bg-white border-start border-4 border-info">
            <h6 class="text-muted text-uppercase mb-1">Total Eventos</h6>
            <h3 class="mb-0 fw-bold" id="totalEventos">0</h3>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card p-3 shadow-sm bg-white border-start border-4 border-success">
            <h6 class="text-muted text-uppercase mb-1">Inicios Sesión</h6>
            <h3 class="mb-0 fw-bold" id="iniciosSesion">0</h3>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card p-3 shadow-sm bg-white border-start border-4 border-warning">
            <h6 class="text-muted text-uppercase mb-1">Modificaciones</h6>
            <h3 class="mb-0 fw-bold" id="modificaciones">0</h3>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card p-3 shadow-sm bg-white border-start border-4 border-primary">
            <h6 class="text-muted text-uppercase mb-1">Usuarios Activos</h6>
            <h3 class="mb-0 fw-bold" id="usuariosAudit">0</h3>
        </div>
    </div>
</div>

<div class="card card-filters-modern mb-4">
    <div class="card-body">
        <form id="formFiltroAuditoria" onsubmit="event.preventDefault(); loadTablaAuditoria(1);">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small">Búsqueda</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-search"></i></span>
                        <input type="text" id="filtroBusqueda" placeholder="Acción, Módulo, Desc..." class="form-control">
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label small">Usuario</label>
                    <select id="filtroUsuario" class="form-control">
                        <option value="">Todos los usuarios</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Módulo</label>
                    <select id="filtroModulo" class="form-control">
                        <option value="">Todos</option>
                        <option value="AUTH">AUTH (Login)</option>
                        <option value="ADMIN">ADMIN</option>
                        <option value="CAJA">CAJA</option>
                        <option value="ADMISION">ADMISION</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label small">Rango de Fechas</label>
                    <div class="input-group">
                        <input type="date" id="fechaInicio" class="form-control" title="Desde">
                        <span class="input-group-text text-muted">a</span>
                        <input type="date" id="fechaFin" class="form-control" title="Hasta">
                    </div>
                </div>
                <div class="col-md-12 mt-3 text-end">
                    <button type="button" class="btn btn-light btn-sm me-2" onclick="limpiarFiltrosAudit()">Limpiar Filtros</button>
                    <button type="submit" class="btn btn-secondary btn-sm"><i class="fas fa-filter me-1"></i> Filtrar</button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="card card-table-modern">
    <div class="card-body table-responsive p-0">
        <table class="table table-hover mb-0" id="tablaAuditoria">
            <thead>
                <tr>
                    <th style="width: 70px;">ID</th>
                    <th style="width: 160px;">Fecha/Hora</th>
                    <th>Usuario</th>
                    <th>Acción</th>
                    <th>Módulo</th>
                    <th>Descripción</th>
                    <th>IP</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="7" class="text-center py-4">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2 text-muted">Cargando registros...</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="card-footer" id="auditoriaPaginacion"></div>
</div>
